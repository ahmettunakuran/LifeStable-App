name: project_lifestable
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.4
  intl: ^0.19.0
  uuid: ^4.4.0
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#0D0D0D"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#0D0D0D"
