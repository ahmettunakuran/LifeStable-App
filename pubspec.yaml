name: project_lifestable
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.4
  intl: ^0.19.0
  uuid: ^4.4.0
  firebase_auth: ^5.4.1
  firebase_storage: ^12.4.1
  rxdart: ^0.28.0
  table_calendar: ^3.1.2
  record: ^5.1.2
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1
  google_generative_ai: ^0.4.7
  permission_handler: ^11.3.1
  cloud_functions: ^5.2.1
  url_launcher: ^6.3.0
  http: ^1.6.0
  firebase_remote_config: ^5.5.0
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  geofence_service: ^6.0.0+1
  flutter_local_notifications: ^21.0.0
  share_plus: ^13.0.0
  firebase_messaging: ^15.2.1
  home_widget: ^0.9.1

dependency_overrides:
  # record_linux 0.7.2 (pinned by `record`) is missing methods from
  # record_platform_interface 1.5.0; force the newer Linux impl.
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
   - assets/images/
